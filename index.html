<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskManager</title>
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">TaskManager</span>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-filter="all">
          <span>📋</span> Todas
          <span class="count" id="count-all">0</span>
        </button>
        <button class="nav-btn" data-filter="pending">
          <span>⏳</span> Pendientes
          <span class="count" id="count-pending">0</span>
        </button>
        <button class="nav-btn" data-filter="done">
          <span>✅</span> Completadas
          <span class="count" id="count-done">0</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="btn-clear" id="btn-clear-done">Limpiar completadas</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <header class="topbar">
        <h1 class="page-title" id="page-title">Todas las tareas</h1>
        <div class="search-wrap">
          <input class="search" id="search" type="text" placeholder="Buscar tarea…" />
        </div>
      </header>

      <!-- ADD TASK FORM -->
      <div class="add-task-wrap">
        <div class="add-task-form">
          <input
            class="task-input"
            id="task-input"
            type="text"
            placeholder="Nueva tarea…"
            maxlength="120"
          />
          <select class="priority-select" id="priority-select">
            <option value="low">🟢 Baja</option>
            <option value="medium" selected>🟡 Media</option>
            <option value="high">🔴 Alta</option>
          </select>
          <button class="btn-add" id="btn-add">Agregar</button>
        </div>
      </div>

      <!-- TASK LIST -->
      <section class="task-list-wrap">
        <ul class="task-list" id="task-list">
          <!-- Las tareas se renderizan aquí con JS -->
        </ul>
        <div class="empty-state" id="empty-state">
          <span>🗂️</span>
          <p>Sin tareas por aquí</p>
        </div>
      </section>

    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
